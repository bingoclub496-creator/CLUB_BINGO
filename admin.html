<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Bingo Club</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="admin-wrapper">
        <h2>CONFIGURACIÓN DE SALA</h2>
        <input type="text" id="nombreSala" placeholder="Nombre de la Sala (Ej: Sala VIP)">
        <input type="text" id="montoPremio" placeholder="Monto del Premio (Ej: 50$)">
        <input type="datetime-local" id="fechaSorteo">
        <button onclick="aperturarPartida()" style="background:#2e7d32; color:white;">APERTURAR PARTIDA</button>
        <button onclick="resetearPartida()" style="background:#d32f2f; color:white;">RESET PARTIDA</button>

        <hr>
        <h2>REGISTRO DE SOCIOS</h2>
        <input type="text" id="nombreSocio" placeholder="Nombre del Socio">
        <input type="number" id="cantCartones" value="1" min="1" max="10">
        <button onclick="crearSocioMaestro()">GENERAR SOCIO Y LINK</button>
        <div id="resultadLinkSocio"></div>

        <div id="listaSocios"></div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>

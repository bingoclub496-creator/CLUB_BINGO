<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Club - Admin Master</title>
    <style>
        :root { --primario: #004d61; --secundario: #25D366; --alerta: #d32f2f; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; text-align: center; }
        .panel { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-master { width: 100%; padding: 20px; border: none; border-radius: 12px; font-size: 1.5rem; font-weight: 900; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .grid-bolas { display: grid; grid-template-columns: repeat(15, 1fr); gap: 5px; margin-top: 20px; }
        .bola-btn { aspect-ratio: 1/1; border-radius: 50%; border: 1px solid #ddd; background: #fff; font-weight: bold; cursor: pointer; }
        .bola-btn.active { background: var(--primario); color: white; transform: scale(1.1); }
        .controles-extra { display: flex; gap: 10px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="panel">
    <h1 style="color: var(--primario);">BINGO CLUB - ADMINISTRADOR</h1>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bingo Club - Admin</title>
    <style>
        body { font-family: sans-serif; background: #004d61; color: white; text-align: center; padding: 20px; }
        .grid-bolas { display: grid; grid-template-columns: repeat(15, 1fr); gap: 5px; margin: 20px auto; max-width: 900px; }
        .bola-btn { padding: 10px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .bola-btn.active { background: #25D366; color: white; }
        .panel-controles { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .btn-start { background: #ffc107; color: #111; padding: 15px 30px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <h1>ADMINISTRACIÓN BINGO CLUB</h1>

    <div class="panel-controles">
        <button class="btn-start" onclick="activarSala()">🚀 INICIAR SORTEO (Quitar Espera)</button>
        <button style="background:red; color:white;" onclick="resetearSorteo()">REINICIAR TODO</button>
        <p>Premio: <input type="number" id="inpPremio" onchange="cambiarPremio(this.value)"> $</p>
    </div>

    <div class="grid-bolas" id="tablero"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* MISMA CONFIG QUE EL ANTERIOR */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const idSala = "SALA_GUARA_01"; // Asegúrate que sea el mismo ID de Firebase

        // Generar botones de bolas
        const letras = ['B','I','N','G','O'];
        const tablero = document.getElementById('tablero');
        for(let i=1; i<=75; i++) {
            let letra = letras[Math.floor((i-1)/15)];
            let val = `${letra}${i}`;
            let b = document.createElement('button');
            b.className = 'bola-btn';
            b.innerText = val;
            b.onclick = async () => {
                b.classList.add('active');
                await updateDoc(doc(db, "salas", idSala), { bolas: arrayUnion(val) });
            };
            tablero.appendChild(b);
        }

        window.activarSala = async () => {
            await updateDoc(doc(db, "salas", idSala), { estado: "jugando", bolas: [], ganadores: [] });
            alert("Sorteo en vivo. La pantalla de espera ha desaparecido para los socios.");
        };

        window.resetearSorteo = async () => {
            if(confirm("¿Borrar todo?")) {
                await updateDoc(doc(db, "salas", idSala), { estado: "espera", bolas: [], ganadores: [] });
                location.reload();
            }
        };

        window.cambiarPremio = async (v) => {
            await updateDoc(doc(db, "salas", idSala), { premioActual: parseFloat(v) });
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Club - Admin Master Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #004d61; color: white; margin: 0; padding: 20px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; max-width: 1300px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px; }
        h2 { font-size: 1.1rem; color: #25D366; text-transform: uppercase; margin-top: 0; border-bottom: 1px solid rgba(37, 211, 102, 0.2); padding-bottom: 10px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 10px; border: none; box-sizing: border-box; font-size: 1rem; }
        button { background: #25D366; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        button:hover { background: #1eb954; transform: translateY(-2px); }
        .tabla-socios { width: 100%; border-collapse: collapse; margin-top: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden; }
        th { text-align: left; padding: 12px; background: rgba(255,255,255,0.1); font-size: 0.8rem; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .btn-status { font-size: 0.9rem; padding: 10px; margin-bottom: 10px; }
        #toast { display:none; position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#25D366; color:white; padding:12px 30px; border-radius:50px; z-index: 1000; }
    </style>
</head>
<body>
    <div style="text-align:center; margin-bottom: 30px;">
        <img src="logo.png" width="70">
        <h1 style="margin:10px 0; font-size: 1.6rem;">SISTEMA ADMINISTRATIVO BINGO CLUB</h1>
    </div>

    <div class="admin-grid">
        <div class="column">
            <div class="card">
                <h2>1. Crear Nueva Sala</h2>
                <input type="text" id="nombreSala" placeholder="Nombre de la Sala">
                <select id="tipoSala">
                    <option value="normal">Normal (Línea / Cruz)</option>
                    <option value="cartonLleno">Cartón Lleno</option>
                </select>
                <input type="number" id="premioInicial" placeholder="Premio Base ($)">
                <input type="datetime-local" id="fechaSorteo">
                <button onclick="crearSalaMaster()"><i class="fas fa-plus"></i> PUBLICAR SALA</button>
            </div>
            <div class="card">
                <h2>2. Registrar Socio</h2>
                <input type="text" id="nombreSocio" placeholder="Nombre y Apellido">
                <select id="selectSalasDisponibles"><option value="">Cargando salas...</option></select>
                <select id="cantCartones">
                    <option value="1">1 Cartón</option>
                    <option value="2">2 Cartones</option>
                    <option value="3">3 Cartones</option>
                </select>
                <button onclick="vincularSocio()" style="background:#1976d2;"><i class="fas fa-user-plus"></i> VINCULAR SOCIO</button>
            </div>
        </div>
        <div class="column">
            <div class="card">
                <h2>3. Gestión de Salas Activas</h2>
                <div id="contenedorTablas"></div>
            </div>
        </div>
    </div>
    <div id="toast">✅ ¡Código copiado!</div>
    <script type="module" src="app.js"></script>
</body>
</html>

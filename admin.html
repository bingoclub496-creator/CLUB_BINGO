<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Club - Panel Maestro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #004d61; color: white; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.2); }
        h1, h2, h3 { color: #25D366; margin-top: 0; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #25D366; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1eb954; }
    </style>
</head>
<body>
    <div style="text-align:center; margin-bottom: 30px;">
        <img src="logo.png" width="80">
        <h1 style="color:white; margin:10px 0;">ADMINISTRADOR BINGO CLUB</h1>
    </div>

    <div class="grid">
        <div class="forms">
            <div class="card" style="margin-bottom:20px;">
                <h2>1. Crear Nueva Sala</h2>
                <input type="text" id="nombreSala" placeholder="Nombre de la Sala (Ej: Sorteo San Juan)">
                <select id="tipoSala">
                    <option value="normal">Normal (Bolas 1-75)</option>
                    <option value="cartonLleno">Cartón Lleno</option>
                </select>
                <input type="number" id="premioInicial" placeholder="Premio Base ($)">
                <button id="crearBtn" onclick="crearSalaMaster()">PUBLICAR SALA</button>
            </div>
            
            <div class="card">
                <h2>2. Vincular Socio</h2>
                <input type="text" id="nombreSocio" placeholder="Nombre del Socio">
                <select id="selectSalas"><option value="">Cargando salas...</option></select>
                <button onclick="vincularSocio()">REGISTRAR Y GENERAR CÓDIGO</button>
            </div>
        </div>
        
        <div class="management card">
            <h2>3. Salas Activas (Sorteo Automático)</h2>
            <div id="contenedorTablas">Esperando salas...</div>
        </div>
    </div>
    
    <script type="module" src="app.js"></script>
</body>
</html>

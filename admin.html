<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Bingo Club</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body style="padding:15px;">
    <div class="admin-wrapper" style="max-width:500px; margin:auto; background:white; padding:15px; border-radius:10px;">
        <h2 style="text-align:center; color:var(--rojo);">ADMINISTRACIÓN</h2>
        <input type="text" id="nombreSala" placeholder="Nombre de la Sala">
        <input type="text" id="montoPremio" placeholder="Premio (Ej: 20$)">
        <input type="datetime-local" id="fechaSorteo">
        <button onclick="aperturarPartida()" style="background:#2e7d32; color:white; margin-bottom:10px;">APERTURAR PARTIDA</button>
        <button onclick="resetearPartida()" style="background:var(--rojo); color:white;">FINALIZAR Y EXPIRAR CÓDIGOS</button>
        <hr>
        <input type="text" id="nombreSocio" placeholder="Nombre del Socio">
        <input type="number" id="cantCartones" value="2" min="1" max="6">
        <button onclick="crearSocioMaestro()" style="background:var(--oro);">GENERAR SOCIO</button>
        <div id="resultadLinkSocio" style="margin-top:10px; font-size:0.9rem;"></div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>

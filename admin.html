<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Bingo Club</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page">
    <div class="glass-container" style="max-width: 500px; margin-bottom: 20px;">
        <h2 style="text-align:center; color:var(--marine); font-size: 1rem; margin-bottom: 10px;">BOLA ACTUAL</h2>
        <div class="master-ball" id="bolaCantada">--</div>
        <div id="statusSorteo" style="text-align:center; margin-top:10px; font-weight:bold; color:red;"></div>
    </div>

    <div class="glass-container" style="max-width: 500px; margin-bottom: 20px;">
        <h3>REGISTRO DE SOCIOS</h3>
        <input type="text" id="nombreSocio" placeholder="Nombre completo" class="input-modern">
        <input type="number" id="cantCartones" min="1" max="6" value="1" class="input-modern">
        <button class="btn-glow" onclick="crearSocioMaestro()">GENERAR SOCIO</button>
        <div id="listaSocios" style="margin-top:15px; max-height: 150px; overflow-y: auto;"></div>
    </div>

    <div class="glass-container" style="max-width: 500px;">
        <h3>PROGRAMAR SORTEO</h3>
        <input type="datetime-local" id="fechaSorteo" class="input-modern">
        <button class="btn-glow" style="background:var(--mango);" onclick="guardarProgramacion()">ACTIVAR RELOJ GLOBAL</button>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>

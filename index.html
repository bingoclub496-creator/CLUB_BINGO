<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo Club - Acceso Seguro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primario: #004d61; --secundario: #25D366; --error: #ff5252; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #000; color: white; display: flex; align-items: center; justify-content: center; }
        
        .login-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            padding: 40px 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2);
            width: 90%; max-width: 360px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        img.logo { width: 90px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--secundario)); }
        h1 { font-size: 1.4rem; margin-bottom: 30px; letter-spacing: 1px; color: var(--secundario); }

        .field { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.75rem; margin-bottom: 8px; opacity: 0.7; padding-left: 5px; text-transform: uppercase; }
        
        input {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: white; color: #222; font-size: 1.1rem;
            box-sizing: border-box; font-weight: bold; text-align: center;
        }

        .btn-entrar {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            background: var(--secundario); color: white; font-size: 1.2rem;
            font-weight: 900; cursor: pointer; margin-top: 15px;
            box-shadow: 0 8px 15px rgba(37, 211, 102, 0.2);
        }

        #loading { display: none; margin-top: 15px; font-size: 0.9rem; color: var(--secundario); animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="logo.png" class="logo">
        <h1>BINGO CLUB</h1>

        <div class="field">
            <label>Nombre del Socio</label>
            <input type="text" id="usuario" placeholder="TU NOMBRE" autocomplete="off">
        </div>

        <div class="field">
            <label>Código de Acceso</label>
            <input type="text" id="codigo" placeholder="ABC123" maxlength="10" style="text-transform: uppercase;">
        </div>

        <button class="btn-entrar" id="btnAccion" onclick="intentarAcceso()">
            ENTRAR AL JUEGO <i class="fas fa-sign-in-alt"></i>
        </button>

        <div id="loading">CONECTANDO CON LA SALA...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA1GIQ1xaJUINYabyqOejrlfjqUAcoQwg4",
            authDomain: "bingo-club-6f019.firebaseapp.com",
            projectId: "bingo-club-6f019",
            storageBucket: "bingo-club-6f019.firebasestorage.app",
            messagingSenderId: "1059179173812",
            appId: "1:1059179173812:web:78b43eaac565d213bec4e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.intentarAcceso = async () => {
            const userIn = document.getElementById('usuario').value.trim().toLowerCase();
            const codeIn = document.getElementById('codigo').value.trim().toUpperCase();
            const loader = document.getElementById('loading');
            const btn = document.getElementById('btnAccion');

            if(!userIn || !codeIn) return alert("❌ Ingresa nombre y código.");

            btn.disabled = true;
            loader.style.display = 'block';

            try {
                // MÉTODO UNIVERSAL: Traemos todos los socios y filtramos aquí
                const snap = await getDocs(collection(db, "socios"));
                let socio = null;

                snap.forEach((docS) => {
                    const data = docS.data();
                    // Limpiamos datos de la base de datos por si tienen espacios extras
                    const dbNombre = (data.nombre || "").trim().toLowerCase();
                    const dbCodigo = (data.codigoAcceso || "").trim().toUpperCase();

                    if (dbCodigo === codeIn && dbNombre === userIn) {
                        socio = { id: docS.id, ...data };
                    }
                });

                if (socio) {
                    sessionStorage.setItem('socioActual', JSON.stringify(socio));
                    window.location.href = "juego.html";
                } else {
                    alert("❌ Código o Nombre incorrecto. Verifica que el Administrador te haya registrado en la sala.");
                    btn.disabled = false;
                    loader.style.display = 'none';
                }

            } catch (e) {
                console.error("Error:", e);
                alert("❌ Fallo de conexión. Revisa tu internet.");
                btn.disabled = false;
                loader.style.display = 'none';
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Club Digital - Acceso</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body class="login-page">
    <div class="login-container">
        <img src="logo.png" alt="Logo" class="main-logo">
        <h1>BINGO CLUB DIGITAL</h1>
        <div class="input-group">
            <input type="text" id="accessCode" placeholder="CÓDIGO DE ACCESO" maxlength="5">
            <button class="btn-login" onclick="validarEntrada()">INGRESAR AL CLUB</button>
        </div>
        <a id="waLink" href="#" target="_blank" class="wa-request">¿No tienes código? Solicítalo aquí</a>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo Club - Acceso</title>
    <style>
        :root { --primario: #004d61; --secundario: #25D366; }
        body { 
            margin: 0; padding: 0; height: 100vh; font-family: 'Segoe UI', sans-serif;
            background: #000 url('fondo.jpg') center/cover no-repeat; /* Fondo base opcional */
            color: white; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: rgba(0, 77, 97, 0.9); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 25px; border: 2px solid var(--secundario);
            width: 85%; max-width: 320px; text-align: center;
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.3);
        }
        img#logoApp { width: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--secundario)); }
        input {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            background: white; color: #333; font-size: 1.5rem; font-weight: 900;
            text-align: center; text-transform: uppercase; margin-bottom: 25px; outline: none;
        }
        button {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            background: var(--secundario); color: white; font-size: 1.2rem;
            font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        #error-msg { color: #ff5252; font-size: 0.9rem; margin-top: 15px; display: none; font-weight: bold; }
        #loading { display: none; color: var(--secundario); margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="logo.png" id="logoApp" alt="Bingo Club">
        <h1 style="font-size: 1.4rem; margin-bottom: 25px; letter-spacing: 2px;">BINGO CLUB</h1>
        <div style="text-align: left; font-size: 0.75rem; opacity: 0.8; margin-bottom: 8px;">CÓDIGO DE ACCESO:</div>
        
        <input type="text" id="codigoAcceso" placeholder="EJ: ABC123" maxlength="10">
        <button id="btnEntrar" onclick="validarEntrada()">ENTRAR</button>
        
        <div id="loading">Conectando a la sala...</div>
        <div id="error-msg">❌ CÓDIGO INCORRECTO</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA1GIQ1xaJUINYabyqOejrlfjqUAcoQwg4",
            authDomain: "bingo-club-6f019.firebaseapp.com",
            projectId: "bingo-club-6f019",
            storageBucket: "bingo-club-6f019.firebasestorage.app",
            messagingSenderId: "1059179173812",
            appId: "1:1059179173812:web:78b43eaac565d213bec4e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.validarEntrada = async () => {
            const codigo = document.getElementById('codigoAcceso').value.trim().toUpperCase();
            if(!codigo) return;

            document.getElementById('btnEntrar').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error-msg').style.display = 'none';

            try {
                const snapSocios = await getDocs(collection(db, "socios"));
                let socioEncontrado = null;

                snapSocios.forEach(doc => {
                    const data = doc.data();
                    if(data.codigoAcceso && data.codigoAcceso.trim().toUpperCase() === codigo) {
                        socioEncontrado = { id: doc.id, ...data };
                    }
                });

                if(socioEncontrado) {
                    // Guardamos bajo el nombre exacto "socioActual"
                    sessionStorage.setItem('socioActual', JSON.stringify(socioEncontrado));
                    window.location.href = "juego.html";
                } else {
                    document.getElementById('btnEntrar').style.display = 'block';
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('error-msg').style.display = 'block';
                }
            } catch(error) {
                console.error("Error:", error);
                alert("Error de red. Intenta nuevamente.");
                document.getElementById('btnEntrar').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            }
        };
    </script>
</body>
</html>

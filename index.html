<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Club - Bienvenido</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="glass-container">
        <header class="brand-header">
            <img src="logo.png" alt="Logo" class="main-logo-img giant-logo">
            <img src="bienvenido.png" alt="Bienvenido" class="welcome-img">
        </header>
        <div class="access-box">
            <input type="text" id="accessCode" placeholder="CÓDIGO DE ACCESO" maxlength="5" class="input-modern">
            <button class="btn-glow" onclick="validarEntrada()">INGRESAR AL CLUB</button>
        </div>
        <div class="support-footer">
            <p>¿No tienes código?</p>
            <a id="waLink" href="#" target="_blank" class="wa-link-btn">Solicitar por WhatsApp</a>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>

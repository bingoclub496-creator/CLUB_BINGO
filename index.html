<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo Club - Bienvenido</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Arial Black', sans-serif; background: url('fondo.jpg') no-repeat center center fixed; background-size: cover; display: flex; justify-content: center; align-items: center; }
        .glass-panel { background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 50px; border: 1.5px solid rgba(255, 255, 255, 0.4); width: 90%; max-width: 420px; padding: 50px 25px; text-align: center; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); display: flex; flex-direction: column; align-items: center; }
        .img-logo { width: 280px; margin-bottom: 20px; display: block; height: auto; }
        .img-bienvenido { width: 280px; margin-bottom: 30px; display: block; height: auto; }
        .label-codigo { color: #263238; font-size: 1.8rem; margin-bottom: 15px; letter-spacing: 4px; font-weight: 900; }
        input { width: 100%; padding: 22px; margin-bottom: 25px; border: none; border-radius: 20px; text-align: center; font-size: 2rem; font-weight: 900; color: #004d61; box-sizing: border-box; background: #ffffff; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); text-transform: uppercase; }
        .btn-ingresar { width: 100%; padding: 24px; background: #004d61; color: white; border: none; border-radius: 20px; font-weight: 900; font-size: 1.4rem; text-transform: uppercase; cursor: pointer; box-shadow: 0 8px 15px rgba(0,77,97,0.3); transition: 0.3s; }
        .btn-ingresar:active { transform: scale(0.98); }
        .btn-ingresar:disabled { background: #555; opacity: 0.7; cursor: not-allowed; }
        .footer-links { margin-top: 40px; }
        .info-text { color: #004d61; font-weight: bold; margin-bottom: 12px; font-size: 1.1rem; }
        .solicita-link { display: flex; align-items: center; justify-content: center; gap: 12px; color: #ffffff; text-decoration: none; font-weight: 900; background: #25D366; padding: 15px 30px; border-radius: 35px; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4); transition: 0.3s; }
        .solicita-link:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="glass-panel">
        <img src="logo.png" alt="Bingo Club" class="img-logo">
        <img src="bienvenido.png" alt="Bienvenidos" class="img-bienvenido">
        <div class="label-codigo">CÓDIGO</div>
        <input type="text" id="accessCode" maxlength="6" autocomplete="off">
        <button class="btn-ingresar" id="btnIngresar">INGRESAR AL CLUB</button>
        
        <div class="footer-links">
            <p class="info-text">¿No tienes código?</p>
            <a href="https://wa.me/584265709830?text=Hola%20Bingo%20Club,%20deseo%20solicitar%20mi%20código%20de%20acceso%20para%20el%20sorteo.%20Mi%20nombre%20es:%20" class="solicita-link" target="_blank">
                <i class="fab fa-whatsapp" style="font-size: 1.6rem;"></i>
                Solicita tu código aquí
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA1GIQ1xaJUINYabyqOejrlfjqUAcoQwg4",
            authDomain: "bingo-club-6f019.firebaseapp.com",
            projectId: "bingo-club-6f019",
            storageBucket: "bingo-club-6f019.firebasestorage.app",
            messagingSenderId: "1059179173812",
            appId: "1:1059179173812:web:78b43eaac565d213bec4e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Lógica de validación interna
        async function validarEntrada() {
            const input = document.getElementById('accessCode');
            const btn = document.getElementById('btnIngresar');
            const codigo = input.value.trim().toUpperCase();

            if(!codigo) {
                alert("⚠️ Por favor, ingresa tu código de socio.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "VERIFICANDO...";

            try {
                // Buscamos al socio en la colección "socios" por su código
                const q = query(collection(db, "socios"), where("codigo", "==", codigo));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const socioDoc = querySnapshot.docs[0];
                    const datosSocio = socioDoc.data();

                    // Guardamos la sesión para que juego.html sepa quién es
                    sessionStorage.setItem('socioActual', JSON.stringify({
                        id: socioDoc.id,
                        nombre: datosSocio.nombre,
                        idSala: datosSocio.idSala,
                        cartones: datosSocio.cartones
                    }));

                    // Redirigimos a la sala de juego
                    window.location.href = 'juego.html';
                } else {
                    alert("❌ Código no encontrado. Por favor, solicita uno nuevo.");
                    btn.disabled = false;
                    btn.innerText = "INGRESAR AL CLUB";
                }
            } catch (error) {
                console.error("Error de Firebase:", error);
                alert("Hubo un problema de conexión. Inténtalo de nuevo.");
                btn.disabled = false;
                btn.innerText = "INGRESAR AL CLUB";
            }
        }

        // Conectamos la función al botón y al evento de la tecla Enter
        document.getElementById('btnIngresar').addEventListener('click', validarEntrada);
        document.getElementById('accessCode').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') validarEntrada();
        });
    </script>
</body>
</html>

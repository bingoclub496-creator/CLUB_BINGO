<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo Club - Acceso</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primario: #004d61; --secundario: #25D366; }
        body { 
            margin: 0; padding: 0; height: 100vh; font-family: 'Segoe UI', sans-serif;
            background: #000; color: white; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: rgba(0, 77, 97, 0.9); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 30px; border: 2px solid var(--secundario);
            width: 85%; max-width: 320px; text-align: center;
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.3);
        }
        img#logoApp { width: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--secundario)); }
        input {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: white; color: #333; font-size: 1.5rem; font-weight: 900;
            text-align: center; text-transform: uppercase; margin-bottom: 25px; outline: none;
        }
        button {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: var(--secundario); color: white; font-size: 1.2rem;
            font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        button:active { transform: scale(0.95); }
        #error-msg { color: #ff5252; font-size: 0.8rem; margin-top: 15px; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="logo.png" id="logoApp">
        <h1 style="font-size: 1.4rem; margin-bottom: 25px; letter-spacing: 2px;">BINGO CLUB</h1>
        <div style="text-align: left; font-size: 0.7rem; opacity: 0.7; margin-bottom: 8px;">CÓDIGO DE ACCESO:</div>
        <input type="text" id="codigoAcceso" placeholder="ABC123" maxlength="10">
        <button onclick="validarEntrada()">ENTRAR AL JUEGO</button>
        <div id="error-msg">❌ CÓDIGO NO VÁLIDO</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA1GIQ1xaJUINYabyqOejrlfjqUAcoQwg4",
            authDomain: "bingo-club-6f019.firebaseapp.com",
            projectId: "bingo-club-6f019",
            storageBucket: "bingo-club-6f019.firebasestorage.app",
            messagingSenderId: "1059179173812",
            appId: "1:1059179173812:web:78b43eaac565d213bec4e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.validarEntrada = async () => {
            const codeIn = document.getElementById('codigoAcceso').value.trim().toUpperCase();
            if(!codeIn) return;

            try {
                const snap = await getDocs(collection(db, "socios"));
                let socioData = null;
                snap.forEach(d => {
                    if(d.data().codigoAcceso.trim().toUpperCase() === codeIn) {
                        socioData = { id: d.id, ...d.data() };
                    }
                });

                if(socioData) {
                    sessionStorage.setItem('socioActual', JSON.stringify(socioData));
                    window.location.href = "juego.html";
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                }
            } catch(e) { console.error(e); }
        };
    </script>
</body>
</html>

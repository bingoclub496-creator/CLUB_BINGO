<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Club - Acceso</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: rgba(0, 77, 97, 0.9); padding: 40px; border-radius: 20px; border: 2px solid #25D366; text-align: center; width: 300px; }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: none; font-size: 1.5rem; text-align: center; text-transform: uppercase; }
        button { width: 100%; padding: 15px; background: #25D366; border: none; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <img src="logo.png" width="80">
        <h2>BINGO CLUB</h2>
        <input type="text" id="cod" placeholder="CÓDIGO">
        <button onclick="acceder()">ENTRAR</button>
        <p id="err" style="color:red; display:none; font-size:12px;">Código no encontrado</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA1GIQ1xaJUINYabyqOejrlfjqUAcoQwg4",
            authDomain: "bingo-club-6f019.firebaseapp.com",
            projectId: "bingo-club-6f019",
            storageBucket: "bingo-club-6f019.firebasestorage.app",
            messagingSenderId: "1059179173812",
            appId: "1:1059179173812:web:78b43eaac565d213bec4e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.acceder = async () => {
            const val = document.getElementById('cod').value.trim().toUpperCase();
            const snap = await getDocs(collection(db, "socios"));
            let encontrado = false;

            snap.forEach(d => {
                if(d.data().codigoAcceso === val) {
                    encontrado = true;
                    sessionStorage.setItem('socio', JSON.stringify({id: d.id, ...d.data()}));
                    window.location.href = "juego.html";
                }
            });
            if(!encontrado) document.getElementById('err').style.display = 'block';
        };
    </script>
</body>
</html>

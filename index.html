<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo Club - Acceso Clientes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primario: #004d61; --secundario: #25D366; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #000; color: white; overflow: hidden; }
        
        /* FONDO DINÁMICO */
        .bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; opacity: 0.4; filter: blur(3px); }
        
        .login-container { 
            height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px;
            background: radial-gradient(circle, rgba(0,77,97,0.4) 0%, rgba(0,0,0,1) 100%);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2);
            width: 100%; max-width: 350px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        img.logo { width: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--secundario)); }

        h1 { font-size: 1.5rem; margin-bottom: 25px; letter-spacing: 2px; color: var(--secundario); text-transform: uppercase; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.8rem; margin-bottom: 8px; opacity: 0.8; margin-left: 10px; }
        
        input {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: rgba(255,255,255,0.9); color: #333; font-size: 1.1rem;
            box-sizing: border-box; font-weight: bold; text-align: center;
            outline: none; transition: 0.3s;
        }

        input:focus { box-shadow: 0 0 15px var(--secundario); transform: scale(1.02); }

        .btn-ingresar {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: var(--secundario); color: white; font-size: 1.2rem;
            font-weight: 900; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            margin-top: 10px;
        }

        .btn-ingresar:active { transform: scale(0.95); }

        #msg-error { color: #ff5252; font-size: 0.85rem; margin-top: 15px; display: none; font-weight: bold; }
        
        .footer { margin-top: 30px; font-size: 0.7rem; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <img src="logo.png" class="logo" alt="Bingo Club">
            <h1>SALA DE JUEGO</h1>

            <div class="input-group">
                <label><i class="fas fa-user"></i> NOMBRE REGISTRADO</label>
                <input type="text" id="usuario" placeholder="Ej: JUAN PEREZ" autocomplete="off">
            </div>

            <div class="input-group">
                <label><i class="fas fa-key"></i> CÓDIGO DE ACCESO</label>
                <input type="text" id="codigo" placeholder="ABC123" maxlength="10" style="text-transform: uppercase;">
            </div>

            <button class="btn-ingresar" onclick="validarIngreso()">
                ENTRAR AHORA <i class="fas fa-chevron-right"></i>
            </button>

            <div id="msg-error">❌ DATOS INCORRECTOS</div>
        </div>

        <div class="footer">Bingo Club &copy; 2026 - San Juan, Caracas</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA1GIQ1xaJUINYabyqOejrlfjqUAcoQwg4",
            authDomain: "bingo-club-6f019.firebaseapp.com",
            projectId: "bingo-club-6f019",
            storageBucket: "bingo-club-6f019.firebasestorage.app",
            messagingSenderId: "1059179173812",
            appId: "1:1059179173812:web:78b43eaac565d213bec4e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.validarIngreso = async () => {
            const userIn = document.getElementById('usuario').value.trim();
            const codeIn = document.getElementById('codigo').value.trim().toUpperCase();
            const errorBox = document.getElementById('msg-error');

            if(!userIn || !codeIn) {
                mostrarError("Completa todos los campos");
                return;
            }

            try {
                // Buscamos en la colección de SOCIOS por el código de acceso
                const q = query(collection(db, "socios"), where("codigoAcceso", "==", codeIn));
                const snap = await getDocs(q);

                if(snap.empty) {
                    mostrarError("CÓDIGO NO ENCONTRADO");
                    return;
                }

                let socioData = null;
                snap.forEach(docS => {
                    const data = docS.data();
                    // Comprobación de seguridad: El nombre debe coincidir (sin importar mayúsculas)
                    if(data.nombre.toLowerCase() === userIn.toLowerCase()) {
                        socioData = { id: docS.id, ...data };
                    }
                });

                if(socioData) {
                    // Guardar en la memoria del navegador para la sala de juego
                    sessionStorage.setItem('socioActual', JSON.stringify(socioData));
                    // Redirigir al juego
                    window.location.href = "juego.html";
                } else {
                    mostrarError("NOMBRE NO COINCIDE CON CÓDIGO");
                }

            } catch (e) {
                console.error(e);
                mostrarError("ERROR DE CONEXIÓN");
            }
        };

        function mostrarError(texto) {
            const errorBox = document.getElementById('msg-error');
            errorBox.innerText = `❌ ${texto}`;
            errorBox.style.display = 'block';
            setTimeout(() => errorBox.style.display = 'none', 3000);
        }
    </script>
</body>
</html>

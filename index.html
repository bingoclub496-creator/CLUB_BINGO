<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo Club - Acceso Seguro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primario: #004d61; --secundario: #25D366; }
        body { 
            margin: 0; padding: 0; height: 100vh; font-family: 'Segoe UI', sans-serif;
            background: #000; color: white; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: rgba(0, 77, 97, 0.9); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 25px; border: 2px solid var(--secundario);
            width: 85%; max-width: 320px; text-align: center;
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.3);
        }
        
        /* Contenedor del logo para manejo de errores */
        #logoContainer { 
            width: 100px; height: 100px; margin: 0 auto 20px auto; 
            display: flex; align-items: center; justify-content: center; 
        }
        
        /* Imagen del logo real (logo.png) */
        img#logoApp { 
            max-width: 100%; max-height: 100%; filter: drop-shadow(0 0 10px var(--secundario)); 
        }
        
        /* Ícono genérico de Bingo si logo.png no existe */
        #logoFallback { 
            display: none; font-size: 80px; color: var(--secundario); 
            filter: drop-shadow(0 0 10px var(--secundario));
        }

        input {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            background: white; color: #333; font-size: 1.5rem; font-weight: 900;
            text-align: center; text-transform: uppercase; margin-bottom: 25px; outline: none;
        }
        button {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            background: var(--secundario); color: white; font-size: 1.2rem;
            font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        #error-msg { color: #ff5252; font-size: 0.9rem; margin-top: 15px; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <div id="logoContainer">
            <img src="logo.png" id="logoApp" alt="Bingo Club" 
                 onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';">
            
            <div id="logoFallback"><i class="fas fa-ticket-alt"></i></div>
        </div>

        <h1 style="font-size: 1.4rem; margin-bottom: 25px; letter-spacing: 2px;">BINGO CLUB</h1>
        <div style="text-align: left; font-size: 0.75rem; opacity: 0.8; margin-bottom: 8px;">CÓDIGO DE ACCESO:</div>
        <input type="text" id="codigoAcceso" placeholder="ABC123" maxlength="10">
        <button onclick="intentarEntrar()">ENTRAR AL SORTEO</button>
        <div id="error-msg">❌ CÓDIGO NO VÁLIDO O SALA INACTIVA</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Mismo config que has estado usando
        const firebaseConfig = {
            apiKey: "AIzaSyA1GIQ1xaJUINYabyqOejrlfjqUAcoQwg4",
            authDomain: "bingo-club-6f019.firebaseapp.com",
            projectId: "bingo-club-6f019",
            storageBucket: "bingo-club-6f019.firebasestorage.app",
            messagingSenderId: "1059179173812",
            appId: "1:1059179173812:web:78b43eaac565d213bec4e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.intentarEntrar = async () => {
            const codeIn = document.getElementById('codigoAcceso').value.trim().toUpperCase();
            if(!codeIn) return;

            try {
                // MÉTODO UNIVERSAL (Garantizado sin índices)
                const snap = await getDocs(collection(db, "socios"));
                let socio = null;

                snap.forEach((docS) => {
                    if (docS.data().codigoAcceso.trim().toUpperCase() === codeIn) {
                        socio = { id: docS.id, ...docS.data() };
                    }
                });

                if (socio) {
                    sessionStorage.setItem('socioActual', JSON.stringify(socio));
                    window.location.href = "juego.html";
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                }
            } catch (e) {
                console.error(e);
                alert("Error de conexión a Firebase.");
            }
        };
    </script>
</body>
</html>

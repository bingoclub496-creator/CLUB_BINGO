<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo Club - Acceso</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primario: #004d61; --secundario: #25D366; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        .login-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            padding: 40px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2);
            width: 100%; max-width: 320px; text-align: center;
        }

        img { width: 80px; margin-bottom: 20px; }
        h1 { font-size: 1.3rem; margin-bottom: 25px; letter-spacing: 1px; color: var(--secundario); }

        input {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: white; color: #333; font-size: 1.2rem;
            box-sizing: border-box; font-weight: bold; text-align: center;
            text-transform: uppercase; margin-bottom: 20px;
        }

        button {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--secundario); color: white; font-size: 1.1rem;
            font-weight: 900; cursor: pointer; transition: 0.3s;
        }

        #error-msg { color: #ff5252; font-size: 0.8rem; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="logo.png">
        <h1>BINGO CLUB</h1>

        <div style="text-align: left; font-size: 0.7rem; opacity: 0.7; margin-bottom: 8px; margin-left: 5px;">CÓDIGO DE ACCESO:</div>
        <input type="text" id="codigoAcceso" placeholder="ABC123" maxlength="10">

        <button onclick="entrar()">ENTRAR <i class="fas fa-arrow-right"></i></button>

        <div id="error-msg">❌ CÓDIGO NO VÁLIDO</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA1GIQ1xaJUINYabyqOejrlfjqUAcoQwg4",
            authDomain: "bingo-club-6f019.firebaseapp.com",
            projectId: "bingo-club-6f019",
            storageBucket: "bingo-club-6f019.firebasestorage.app",
            messagingSenderId: "1059179173812",
            appId: "1:1059179173812:web:78b43eaac565d213bec4e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.entrar = async () => {
            const input = document.getElementById('codigoAcceso').value.trim().toUpperCase();
            const error = document.getElementById('error-msg');

            if(!input) return alert("Ingresa tu código");

            try {
                const snap = await getDocs(collection(db, "socios"));
                let socio = null;

                snap.forEach((docS) => {
                    const data = docS.data();
                    if (data.codigoAcceso.trim().toUpperCase() === input) {
                        socio = { id: docS.id, ...data };
                    }
                });

                if (socio) {
                    sessionStorage.setItem('socioActual', JSON.stringify(socio));
                    window.location.href = "juego.html";
                } else {
                    error.style.display = 'block';
                    setTimeout(() => error.style.display = 'none', 3000);
                }
            } catch (e) {
                console.error(e);
                alert("Error de conexión");
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En Vivo - Bingo Club</title>
    <link rel="stylesheet" href="estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div id="displayPremio">ESPERANDO APERTURA...</div>
    
    <div class="game-header">
        <div id="statusJuego" style="text-align: center;">
            <span id="letraBola" style="display:block; font-size:1.5rem; font-weight:900; color:var(--rojo);">BOLA</span>
            <h1 id="numeroBola" style="font-size:4.5rem; margin:0; line-height:1;">--</h1>
        </div>
        <div class="historial-mini" style="display:flex; gap:8px;">
            <div id="hist0" class="h-ball">-</div>
            <div id="hist1" class="h-ball">-</div>
            <div id="hist2" class="h-ball">-</div>
        </div>
    </div>

    <div id="userName" style="text-align:center; padding:10px; font-weight:bold; color:#444; text-transform:uppercase;"></div>
    
    <div id="cartonesContainer"></div>

    <div id="winnerOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center;">
        <h1 style="color:var(--oro); font-size:3.5rem; margin:0;">¡BINGO!</h1>
        <h3 style="color:#ccc; margin-top:5px;">TENEMOS GANADOR(ES)</h3>
        <h2 id="ganadorNombre" style="margin:20px; font-size:2rem;"></h2>
        <button onclick="location.href='index.html'" style="margin-top:20px; padding:15px 40px; border-radius:30px; border:none; background:var(--rojo); color:white; font-weight:bold; font-size:1.2rem; cursor:pointer;">SALIR DE LA SALA</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

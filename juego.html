<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo Club - Sala de Juego</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html {
            margin: 0; padding: 0; min-height: 100%;
            font-family: 'Arial Black', sans-serif;
            background-size: cover !important;
            background-position: center center !important;
            background-attachment: fixed !important;
        }

        .header-juego {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-bottom: 3px solid #004d61;
            position: sticky; top: 0; z-index: 100;
        }

        .container {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .carton {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 10px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            width: 100%;
            max-width: 380px;
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            background: #fff;
            padding: 10px;
            border-radius: 10px;
        }

        .letra-col {
            text-align: center;
            font-size: 1.2rem;
            color: #004d61;
            padding-bottom: 5px;
        }

        .cell {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9f9f9;
            border: 1px solid #ddd;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
            color: #333;
        }

        /* Estilo para celda marcada */
        .cell.marked {
            background: #1a1a1a;
            color: white;
            border-radius: 50%;
            transform: scale(0.9);
        }

        /* Celda del Centro (Libre) */
        .cell.free {
            background: #004d61;
            color: white;
            font-size: 0.6rem;
            text-align: center;
            cursor: default;
        }

        .btn-cantar {
            width: 100%;
            margin-top: 15px;
            padding: 15px;
            background: #ffc107;
            border: none;
            border-radius: 10px;
            font-weight: 900;
            font-size: 1.2rem;
            color: #000;
            text-transform: uppercase;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        #premio-display {
            background: #d32f2f;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body id="cuerpoJuego">

    <div class="header-juego">
        <img src="logo.png" width="50">
        <div style="text-align:center">
            <span style="font-size: 0.7rem; color: #666;">BIENVENIDO</span><br>
            <span id="nombreSocio" style="color: #004d61;">---</span>
        </div>
        <div id="premio-display">Premio: <span id="valPremio">--</span></div>
    </div>

    <div class="container" id="cartonesContainer">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuración (Misma que app.js)
        const firebaseConfig = {
            apiKey: "AIzaSyA1GIQ1xaJUINYabyqOejrlfjqUAcoQwg4",
            authDomain: "bingo-club-6f019.firebaseapp.com",
            projectId: "bingo-club-6f019",
            storageBucket: "bingo-club-6f019.firebasestorage.app",
            messagingSenderId: "1059179173812",
            appId: "1:1059179173812:web:78b43eaac565d213bec4e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function cargarJuego() {
            const socioData = JSON.parse(sessionStorage.getItem('socioActual'));
            if(!socioData) { window.location.href = 'index.html'; return; }

            document.getElementById('nombreSocio').innerText = socioData.nombre;

            // Obtener datos de la SALA para el fondo y premio
            const salaRef = doc(db, "salas", socioData.idSala);
            const salaSnap = await getDoc(salaRef);

            if (salaSnap.exists()) {
                const sala = salaSnap.data();
                document.getElementById('valPremio').innerText = sala.premio;
                // APLICAR FONDO DINÁMICO
                document.getElementById('cuerpoJuego').style.background = `url('${sala.fondo}') no-repeat center center fixed`;
            }

            // Generar Cartones
            const container = document.getElementById('cartonesContainer');
            socioData.cartones.forEach((c, index) => {
                let gridHtml = `
                <div class="carton">
                    <div style="text-align:center; color:white; margin-bottom:5px; font-size:0.8rem">CARTÓN #${index+1}</div>
                    <div class="bingo-grid">
                        <div class="letra-col">B</div><div class="letra-col">I</div><div class="letra-col">N</div><div class="letra-col">G</div><div class="letra-col">O</div>
                `;

                for(let i=0; i<5; i++) {
                    ['B','I','N','G','O'].forEach(letra => {
                        const esCentro = letra === 'N' && i === 2;
                        if(esCentro) {
                            gridHtml += `<div class="cell free">BINGO<br>CLUB</div>`;
                        } else {
                            gridHtml += `<div class="cell" onclick="this.classList.toggle('marked')">${c[letra][i]}</div>`;
                        }
                    });
                }

                gridHtml += `</div><button class="btn-cantar" onclick="alert('¡BINGO SOLICITADO! Esperando validación...')">¡CANTAR BINGO!</button></div>`;
                container.innerHTML += gridHtml;
            });
        }

        window.onload = cargarJuego;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Club - En Vivo</title>
    <link rel="stylesheet" href="estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div id="displayPremio">ESPERANDO APERTURA...</div>
    
    <div class="game-header">
        <div id="statusJuego">
            <span id="letraBola">B</span>
            <h1 id="numeroBola">00</h1>
        </div>
        <div class="historial-mini">
            <div id="hist0" class="h-ball">-</div>
            <div id="hist1" class="h-ball">-</div>
            <div id="hist2" class="h-ball">-</div>
        </div>
    </div>

    <div id="userName" style="text-align:center; font-weight:bold; color:#666;"></div>
    
    <div id="cartonesContainer"></div>

    <div id="winnerOverlay" style="display:none;">
        <div class="winner-card">
            <h1>¡BINGO!</h1>
            <p id="ganadorNombre"></p>
            <button onclick="location.href='index.html'">SALIR</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

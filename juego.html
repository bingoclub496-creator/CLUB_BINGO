<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo Club - En Vivo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="game-page">
    <img src="logo.png" class="corner-logo" alt="Logo">

    <div id="pantallaEspera" class="timer-float">
        <img src="logo.png" style="width:120px; margin-bottom:20px;">
        EL JUEGO INICIA EN:
        <span id="relojDiscreto">00:00</span>
    </div>

    <div id="areaJuego" style="display:none;">
        <header class="game-top-nav">
            <div id="userName" class="user-label"></div>
            <div class="ball-display">
                <div class="ball-letter" id="letraBola">?</div>
                <div class="ball-number" id="numeroBola">--</div>
            </div>
            <div class="history-balls" id="bolaHistorial"></div>
        </header>
        
        <main id="cartonesContainer" class="compact-container"></main>
    </div>

    <div id="winnerOverlay" class="winner-popup" style="display:none;">
        <div class="winner-content">
            <img src="logo.png" style="width:120px;">
            <h1 class="glow-text">¡TENEMOS GANADOR!</h1>
            <h2 id="ganadorNombre">---</h2>
            <button onclick="window.location.href='index.html'" class="btn-glow">SALIR AL INICIO</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

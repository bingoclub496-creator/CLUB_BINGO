<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo Club - En Vivo</title>
    <link rel="stylesheet" href="estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div id="displayPremio">CARGANDO PREMIO...</div>
    <div class="game-header">
        <div id="statusJuego">
            <span id="letraBola">BOLA</span>
            <h1 id="numeroBola">--</h1>
        </div>
        <div class="historial-mini">
            <div id="hist0" class="h-ball">-</div>
            <div id="hist1" class="h-ball">-</div>
            <div id="hist2" class="h-ball">-</div>
        </div>
    </div>
    <div id="userName"></div>
    <div id="cartonesContainer"></div>
    <div id="winnerOverlay" style="display:none;">
        <div class="winner-card">
            <h1>¡BINGO!</h1>
            <h2 id="ganadorNombre"></h2>
            <button onclick="location.href='index.html'">SALIR</button>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
